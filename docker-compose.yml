# JMF 509 Warehouse - Site only (add DB later)
# Run: docker compose up -d
# Uses webdevops/php-apache (includes pdo_pgsql, no build needed)
# Coolify: assign domain; proxy routes to container port 80

services:
  web:
    image: webdevops/php-apache:8.2
    environment:
      - WEB_DOCUMENT_ROOT=/application/code
    expose:
      - "80"
    volumes:
      - .:/application/code
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
